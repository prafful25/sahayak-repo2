name: Build API Batch

on:
  workflow_dispatch:
    inputs:
      container:
        description: 'Container name (e.g. gst, edu, med)'
        required: true
        type: string
      api_name:
        description: 'Single spec filename (e.g. gst_rate_api.txt)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aider-chat fastapi uvicorn psycopg2-binary redis pytest pytest-asyncio python-dotenv pydantic requests httpx

      - name: Build API with aider + Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          CONTAINER="${{ github.event.inputs.container }}"
          API_FILE="${{ github.event.inputs.api_name }}"
          API_NAME="${API_FILE%.txt}"
          SPEC=$(cat specs/${API_FILE})
          SPEC=$(cat specs/${API_FILE})
