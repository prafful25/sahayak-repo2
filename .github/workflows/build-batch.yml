                                                          no                                  \
                      "$                      "$                      "$              /route                     st                   _${    NA     y (m                      "$ }"                                 "$        I_NAME}.py \
            tests/${CONTAINE           PI_            tests/${CONTAINE   and            tests/${CONTAINE   git             tests/${CONTAINE           PI_            tests/${CONTAINE   and            tests/${CONTAINE   git             tests/${Cnam            tests/${CONTAINE           PI_"
           it           it           it           it           it  |          t -m "           it           it           it           it                  it           it           it           it  PR
           it           it           g           it           it           g             it           it           gil           it           it           g           it           it           g       .e           it           it           g           it           it           g        github.event.inputs.api_name }}" || true

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="[Repo1] ${{ github.event.inputs.api_name }}: ${{ job.status }}"
