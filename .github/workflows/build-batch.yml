name: Build API Batch

on:
  workflow_dispatch:
    inputs:
      container:
        description: 'Container name'
        required: true
        type: string
      api_name:
        description: 'Spec filename'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show inputs
        run: echo 'container=${{ github.event.inputs.container }} api=${{ github.event.inputs.api_name }}'
